# eustasy/.Normal 4.0beta9
name: Normal (XML)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.xml"
      - ".github/workflows/xml.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.xml"
      - ".github/workflows/xml.yml"

permissions:
  contents: read

jobs:
  xml:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Lint XML (xmllint)
        run: git ls-files -- '*.xml' | xargs -r xmllint --noout
