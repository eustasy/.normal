# eustasy/.Normal 4.0beta4
name: Normal (XML)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["**.xml"]
  pull_request:
    branches: [main]
    paths: ["**.xml"]

permissions:
  contents: read

jobs:
  xml:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Lint XML (xmllint)
        run: find . -name "*.xml" -not -path "*/vendor/*" -not -path "*/node_modules/*" | xargs xmllint --noout
