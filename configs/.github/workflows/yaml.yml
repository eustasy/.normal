# eustasy/.Normal 4.0beta11
name: "Normal: YAML"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.yml"
      - "**.yaml"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - "**.yml"
      - "**.yaml"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  yaml:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0

      - name: Lint (yamllint, actionlint, zizmor)
        run: qlty check --all --no-formatters --filter=yamllint,actionlint,zizmor
