# eustasy/.Normal 4.0beta3
name: Normal (YAML)

on:
  push:
    branches: [main]
    paths: ["**.yml", "**.yaml"]
  pull_request:
    branches: [main]
    paths: ["**.yml", "**.yaml"]

permissions:
  contents: read

jobs:
  yaml:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: qltysh/qlty-action/install@v2

      - name: Lint (yamllint, actionlint, zizmor, editorconfig-checker)
        run: qlty check --all --no-formatters --filter=yamllint,actionlint,zizmor,editorconfig-checker

      - name: Format check (prettier)
        run: qlty check --all --filter=prettier
