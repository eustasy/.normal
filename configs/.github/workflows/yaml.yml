# eustasy/.Normal 4.0beta10
name: "Normal: YAML"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.yml"
      - "**.yaml"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - "**.yml"
      - "**.yaml"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  yaml:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2.2.3

      - name: Lint (yamllint, actionlint, zizmor)
        run: qlty check --all --no-formatters --filter=yamllint,actionlint,zizmor
