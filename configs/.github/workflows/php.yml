# eustasy/.Normal 4.0beta3
name: Normal (PHP)

on:
  push:
    branches: [main]
    paths: ["**.php"]
  pull_request:
    branches: [main]
    paths: ["**.php"]

permissions:
  contents: read

jobs:
  php:
    name: Lint + format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.3", "8.4", "8.5", "8.6"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0

      - name: Lint (phpstan)
        run: qlty check --all --no-formatters --filter=phpstan

      - name: Format check (php-cs-fixer)
        run: qlty check --all --filter=php-cs-fixer
