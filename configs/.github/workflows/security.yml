name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # Monday 03:00 UTC

permissions:
  contents: read

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: qltysh/qlty-action/install@v2

      - name: Security scan
        run: qlty check --all --no-formatters --filter=gitleaks --filter=trivy --filter=bandit --filter=semgrep --filter=osv-scanner
