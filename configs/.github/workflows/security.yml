# eustasy/.Normal 4.0beta10
name: "Normal: Security"
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: qltysh/qlty-action/install@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0

      - name: Security scan
        run: qlty check --all --no-formatters --filter=gitleaks,trivy,osv-scanner
