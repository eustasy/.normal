# eustasy/.Normal 4.0beta10
name: "Normal: Security"
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: qltysh/qlty-action/install@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2.2.3

      - name: Security scan
        run: qlty check --all --no-formatters --filter=gitleaks,trivy,osv-scanner
