# eustasy/.Normal 4.0beta3
name: Normal (Env)

on:
  push:
    branches: [main]
    paths: [".env*"]
  pull_request:
    branches: [main]
    paths: [".env*"]

permissions:
  contents: read

jobs:
  env:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0

      - name: Lint (dotenv-linter)
        run: qlty check --all --filter=dotenv-linter
