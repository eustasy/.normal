# eustasy/.Normal 4.0beta10
name: "Normal: Env"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".env*"
      - ".github/workflows/env.yml"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - ".env*"
      - ".github/workflows/env.yml"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  env:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2.2.3

      - name: Lint (dotenv-linter)
        run: qlty check --all --filter=dotenv-linter
