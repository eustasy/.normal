# eustasy/.Normal 4.0beta10
name: Normal: Env

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".env*"
      - ".github/workflows/env.yml"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - ".env*"
      - ".github/workflows/env.yml"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  env:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1

      - name: Lint (dotenv-linter)
        run: qlty check --all --filter=dotenv-linter
