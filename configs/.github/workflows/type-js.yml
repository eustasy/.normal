# eustasy/.Normal 4.0beta10
name: "Type: TS"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.js"
      - "**.ts"
      - "**.mjs"
      - "**.cjs"
      - "**.mts"
      - "**.cts"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/type-js.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.js"
      - "**.ts"
      - "**.mjs"
      - "**.cjs"
      - "**.mts"
      - "**.cts"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/type-js.yml"

permissions:
  contents: read

jobs:
  type-js:
    # Remove the `if: false` below to activate this workflow.
    if: false
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc)
        run: npx tsc --noEmit
