# eustasy/.Normal 4.0beta11
name: "Test: Python"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - "setup.cfg"
      - "tox.ini"
      - ".github/workflows/test-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - "setup.cfg"
      - "tox.ini"
      - ".github/workflows/test-python.yml"

permissions:
  contents: read

jobs:
  test-python:
    # Remove the `if: false` below to activate this workflow.
    if: false
    name: pytest + coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest --cov --cov-report=xml:coverage/cobertura.xml

      - name: Upload coverage to Qlty
        if: matrix.python-version == '3.13'
        uses: qltysh/qlty-action/coverage@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0
        with:
          coverage-token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/cobertura.xml
