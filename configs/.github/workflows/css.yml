name: CSS

on:
  push:
    branches: [main]
    paths: ["**.css", "**.scss"]
  pull_request:
    branches: [main]
    paths: ["**.css", "**.scss"]
  schedule:
    - cron: "0 3 * * 1" # Monday 03:00 UTC

permissions:
  contents: read

jobs:
  css:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: qltysh/qlty-action/install@v2

      - name: Lint (stylelint)
        run: qlty check --all --no-formatters --filter=stylelint

      - name: Format check (prettier)
        run: qlty check --all --filter=prettier
