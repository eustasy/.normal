# eustasy/.Normal 4.0beta11
name: "Normal: CSS/SCSS"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.css"
      - "**.scss"
      - ".github/workflows/css.yml"
      - ".qlty/configs/.stylelintrc.json"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - "**.css"
      - "**.scss"
      - ".github/workflows/css.yml"
      - ".qlty/configs/.stylelintrc.json"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  css:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0

      - name: Lint + format check (stylelint)
        run: qlty check --all --filter=stylelint
