# eustasy/.Normal 4.0beta10
name: "Normal: Markdown"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/md.yml"
      - ".qlty/configs/.markdownlint.json"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/md.yml"
      - ".qlty/configs/.markdownlint.json"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  md:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0

      - name: Lint + format check (markdownlint)
        run: qlty check --all --filter=markdownlint
