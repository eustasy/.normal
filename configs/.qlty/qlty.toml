config_version = "0"

# Exclude patterns apply to all plugins (linting and formatting).
# Sources: old .eslintignore, .stylelintignore, and .codeclimate.yml defaults.
exclude_patterns = [
  # Minified / bundled / custom overrides
  "**/*.min.*",
  "**/*.pack.*",
  "**/*.custom.*",

  # Legacy libs directory
  "**/_libs/**",

  # Dependency directories
  "**/vendor/**",
  "**/node_modules/**",

  # Build output
  "**/dist/**",
  "**/build/**",
  "**/out/**",

  # Coverage output
  "**/coverage/**",

  # Python caches
  "**/__pycache__/**",
  "**/.pytest_cache/**",
  "**/*.pyc",
]

# ── Smells ──────────────────────────────────────────────────────────────────
# Matches Phoenix thresholds.

[smells]
[smells.nested_control_flow]
threshold = 4

[smells.function_parameters]
threshold = 10

# ── Source ───────────────────────────────────────────────────────────────────

[[source]]
name = "default"
default = true

# ── Linters ──────────────────────────────────────────────────────────────────

[[plugin]]
name = "oxc"

[[plugin]]
name = "stylelint"

[[plugin]]
name = "markdownlint"

[[plugin]]
name = "ruff"

[[plugin]]
name = "phpstan"

[[plugin]]
name = "sqlfluff"

[[plugin]]
name = "yamllint"
# install.sh deploys these (overwritten on every .normal update), and actionlint
# + zizmor already lint the workflows with GitHub-aware rules — yamllint's generic
# style checks (e.g. the YAML 1.1 truthy false-positive on `on:`) are just noise.
exclude_patterns = [
  "**/.github/workflows/**",
  "**/.github/dependabot.yml",
]

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "actionlint"

[[plugin]]
name = "zizmor"

[[plugin]]
name = "knip"

[[plugin]]
name = "dotenv-linter"

# ── Formatters ───────────────────────────────────────────────────────────────

[[plugin]]
name = "prettier"
# Machine-managed files: composer owns composer.json; .vscode and .claude are
# editor/tool-managed; install.sh deploys the rest (overwriting them on every
# .normal update), so a downstream repo can't fix their formatting without
# diverging. Excluded from formatting only — NOT globally — so other plugins
# still see them (osv-scanner reads composer.json; zizmor, actionlint and
# yamllint still lint .github/workflows).
exclude_patterns = [
  "**/composer.json",          # owned by composer
  "**/.qlty/**",               # qlty.toml + all linter/formatter configs
  "**/.vscode/**",             # editor settings (install.sh deploys settings.json)
  "**/.claude/**",             # Claude Code config (tool-managed)
  "**/.github/dependabot.yml", # deployed by install.sh
  "**/.github/workflows/**",   # deployed by install.sh
]

[[plugin]]
name = "php-cs-fixer"
# .php-cs-fixer.dist.php and other .qlty/ configs are deployed by .normal's
# install.sh — exclude from formatting so they aren't reflowed.
exclude_patterns = [
  "**/.qlty/**",
]

[[plugin]]
name = "shfmt"

# ── Security ─────────────────────────────────────────────────────────────────

[[plugin]]
name = "gitleaks"

[[plugin]]
name = "bandit"

[[plugin]]
name = "trivy"

[[plugin]]
name = "osv-scanner"
