config_version = "0"

# Exclude patterns apply to all plugins (linting and formatting).
# Sources: old .eslintignore, .stylelintignore, and .codeclimate.yml defaults.
exclude_patterns = [
  # Minified / bundled / custom overrides
  "**/*.min.*",
  "**/*.pack.*",
  "**/*.custom.*",

  # Legacy libs directory
  "**/_libs/**",

  # Dependency directories
  "**/vendor/**",
  "**/node_modules/**",

  # Build output
  "**/dist/**",
  "**/build/**",
  "**/out/**",

  # Coverage output
  "**/coverage/**",

  # Python caches
  "**/__pycache__/**",
  "**/.pytest_cache/**",
  "**/*.pyc",
]

# ── Smells ──────────────────────────────────────────────────────────────────
# Matches Phoenix thresholds.

[smells]
[smells.nested_control_flow]
threshold = 4

[smells.function_parameters]
threshold = 10

# ── Source ───────────────────────────────────────────────────────────────────

[[source]]
name = "default"
default = true

# ── Linters ──────────────────────────────────────────────────────────────────

[[plugin]]
name = "oxc"

[[plugin]]
name = "stylelint"

[[plugin]]
name = "markdownlint"

[[plugin]]
name = "ruff"

[[plugin]]
name = "phpstan"

[[plugin]]
name = "sqlfluff"

[[plugin]]
name = "yamllint"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "actionlint"

[[plugin]]
name = "zizmor"

[[plugin]]
name = "knip"

[[plugin]]
name = "dotenv-linter"

# ── Formatters ───────────────────────────────────────────────────────────────

[[plugin]]
name = "prettier"

[[plugin]]
name = "php-cs-fixer"

[[plugin]]
name = "shfmt"

# ── Security ─────────────────────────────────────────────────────────────────

[[plugin]]
name = "gitleaks"

[[plugin]]
name = "bandit"

[[plugin]]
name = "trivy"

[[plugin]]
name = "osv-scanner"

# ── Per-plugin file excludes ─────────────────────────────────────────────────
# qlty has no plugin-level `exclude_patterns` key (it is silently ignored); scope
# file skips to specific plugins with [[exclude]] blocks instead. These are NOT
# global, so dependency/security scanners (osv-scanner, gitleaks, trivy, bandit,
# actionlint, zizmor) still see every file.

# Machine-managed / tool-owned files that must never be reformatted: composer
# owns composer.json; .vscode and .claude are editor/tool-managed; install.sh
# deploys .qlty/, dependabot.yml and the workflows (overwritten on every update),
# so a downstream repo can't fix their formatting without diverging from .normal.
[[exclude]]
plugins = ["prettier"]
file_patterns = [
  "**/composer.json",
  "**/.qlty/**",
  "**/.vscode/**",
  "**/.claude/**",
  "**/.github/dependabot.yml",
  "**/.github/workflows/**",
]

# .php-cs-fixer.dist.php and the other .qlty/ configs are deployed by install.sh.
[[exclude]]
plugins = ["php-cs-fixer"]
file_patterns = [
  "**/.qlty/**",
]

# actionlint + zizmor already lint workflows with GitHub-aware rules, so
# yamllint's generic style checks (e.g. the YAML 1.1 truthy false-positive on
# `on:`) are just noise on the install.sh-deployed workflow + dependabot files.
[[exclude]]
plugins = ["yamllint"]
file_patterns = [
  "**/.github/workflows/**",
  "**/.github/dependabot.yml",
]
